<!doctype html>
<html lang="zh-TW" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>房間預約管理系統 - 卡雅音樂教室</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* ... 這裡保留你原本所有的 CSS 樣式 (省略以節省空間，內容與你提供的一致) ... */
    body { box-sizing: border-box; font-family: 'Microsoft JhengHei', 'Noto Sans TC', 'PingFang TC', sans-serif; }
    .calendar-day { width: 38px; height: 38px; border-radius: 6px; cursor: pointer; transition: all 0.3s ease; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; background: white; border: 2px solid #F9A8D4; color: #1a1a1a; position: relative; }
    .calendar-day.has-booking::after { content: ''; position: absolute; width: 6px; height: 6px; background: #DC2626; border-radius: 50%; top: 3px; right: 3px; z-index: 3; box-shadow: 0 0 3px rgba(220, 38, 38, 0.6); }
    .calendar-day.red-circle::before { content: ''; position: absolute; width: 32px; height: 32px; border: 2px solid #DC2626; border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 1; }
    .calendar-day span { position: relative; z-index: 2; }
    .calendar-day:hover:not(.disabled) { background: #FCE7F3; transform: scale(1.15); z-index: 10; border-color: #EC4899; }
    .calendar-day.selected { background: linear-gradient(135deg, #EC4899 0%, #DB2777 100%); color: white; box-shadow: 0 6px 16px rgba(236, 72, 153, 0.5); transform: scale(1.1); z-index: 5; border-color: #BE185D; }
    .calendar-day.today { border: 3px solid #F59E0B; font-weight: 700; box-shadow: 0 0 0 2px #FEF3C7; }
    .calendar-day.disabled { color: #D1D5DB; cursor: not-allowed; opacity: 0.35; border-color: #E5E7EB; }
    .room-card { border: 2px solid #F9A8D4; border-radius: 8px; padding: 10px 20px; cursor: pointer; transition: all 0.3s ease; background: white; text-align: center; font-size: 14px; }
    .room-card.active { background: linear-gradient(135deg, #EC4899 0%, #DB2777 100%); color: white; border-color: #BE185D; }
    .btn-primary { background: linear-gradient(135deg, #10B981 0%, #059669 100%); color: white; padding: 12px 24px; border-radius: 10px; font-weight: 700; cursor: pointer; }
    .btn-secondary { background: linear-gradient(135deg, #3B82F6 0%, #2563EB 100%); color: white; padding: 12px 24px; border-radius: 10px; font-weight: 700; cursor: pointer; }
    .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background-color: rgba(190, 24, 93, 0.4); z-index: 1000; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(8px); }
    .modal-content { background: white; border-radius: 20px; max-width: 700px; width: 90%; max-height: 90%; overflow-y: auto; box-shadow: 0 24px 60px rgba(190, 24, 93, 0.3); border: 3px solid #F9A8D4; }
    .input-pink { border: 2px solid #F9A8D4; border-radius: 8px; padding: 10px 14px; width: 100%; }
    .select-pink { border: 2px solid #F9A8D4; border-radius: 8px; padding: 10px 14px; width: 100%; cursor: pointer; }
    .price-display { background: linear-gradient(135deg, #FEF3C7 0%, #FDE68A 100%); border: 3px solid #F59E0B; border-radius: 12px; padding: 20px; }
    .login-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: linear-gradient(135deg, #FDF2F8 0%, #FCE7F3 100%); z-index: 2000; display: flex; align-items: center; justify-content: center; }
    .login-container { background: white; border-radius: 20px; padding: 40px; box-shadow: 0 24px 60px rgba(190, 24, 93, 0.3); border: 3px solid #F9A8D4; max-width: 400px; width: 90%; }
  </style>
</head>
<body class="h-full" style="background: linear-gradient(135deg, #FDF2F8 0%, #FCE7F3 100%);">

  <div id="login-overlay" class="login-overlay">
    <div class="login-container">
      <h2 class="text-2xl font-bold text-pink-900 mb-6 text-center">🎵 卡雅音樂教室</h2>
      <div class="space-y-4">
        <button id="public-access-btn" class="btn-secondary w-full py-4 text-lg">🌐 公開預約系統</button>
        <div class="text-center text-gray-500 text-sm">或</div>
        <div>
          <label class="block text-sm font-bold text-pink-900 mb-2">🔑 工作人員登入</label>
          <input type="password" id="staff-password" class="input-pink mb-4" placeholder="輸入管理密碼">
          <button id="staff-login-btn" class="btn-primary w-full py-4 text-lg">👨‍💼 登入</button>
        </div>
      </div>
    </div>
  </div>

  <div id="app-content" class="h-full flex flex-col overflow-hidden" style="display: none;">
    <header style="background: linear-gradient(135deg, #EC4899 0%, #DB2777 100%); border-bottom: 4px solid #BE185D;" class="px-8 py-4 shadow-xl">
        <div class="flex justify-between items-center">
         <div class="flex items-center gap-4">
          <div class="text-5xl">🎵</div>
          <div>
           <h1 class="text-2xl font-bold text-white">卡雅音樂教室</h1>
           <p class="text-pink-100 text-xs mt-1 font-semibold">📍 香港上水符興街43-45號1B室 | 📞 5400 1874</p>
          </div>
         </div>
         <div id="statistics-section" style="display:none;" class="flex gap-3">
             <div class="bg-white/20 p-2 rounded text-white text-center">
                 <p class="text-xs">月收入</p><p id="month-income" class="font-bold">$0</p>
             </div>
         </div>
        </div>
    </header>

    <main class="flex-1 flex overflow-hidden">
        <section class="flex-1 overflow-y-auto p-6 scrollbar-pink">
            <form id="booking-form" class="space-y-6">
                <div class="bg-white rounded-xl border-2 border-pink-300 p-4">
                    <h3 class="font-bold text-pink-900 mb-3">🎹 選擇房間</h3>
                    <div class="flex gap-2 flex-wrap">
                        <div class="room-card" data-room="A">房間A (三角)</div>
                        <div class="room-card" data-room="B">房間B (直身)</div>
                        <div class="room-card" data-room="C">房間C (數碼)</div>
                        <div class="room-card" data-room="D">房間D (直身)</div>
                        <div class="room-card" data-room="E">房間E (直身)</div>
                        <div class="room-card" data-room="1">房間1 (活動)</div>
                        <div class="room-card" data-room="2">房間2 (伴奏)</div>
                    </div>
                </div>
                
                <div class="bg-white rounded-xl border-2 border-pink-300 p-4">
                    <div class="flex justify-between mb-2">
                        <h3 class="font-bold text-pink-900">📅 選擇日期</h3>
                        <div class="flex gap-1">
                            <button type="button" id="prev-month-btn" class="text-xs border px-2 py-1 rounded">上月</button>
                            <button type="button" id="next-month-btn" class="text-xs border px-2 py-1 rounded">下月</button>
                        </div>
                    </div>
                    <div id="calendar-month-year" class="text-center font-bold text-pink-700 text-sm mb-2"></div>
                    <div id="calendar-grid" class="grid grid-cols-7 gap-1"></div>
                    <div id="selected-dates-display" class="mt-2 text-xs flex flex-wrap gap-1"></div>
                </div>

                <div class="bg-white rounded-xl border-2 border-pink-300 p-4">
                    <h3 class="font-bold text-pink-900 mb-3">⏰ 選擇時間</h3>
                    <div class="grid grid-cols-2 gap-4">
                        <select id="start-time-select" class="select-pink text-sm"></select>
                        <select id="end-time-select" class="select-pink text-sm"></select>
                    </div>
                </div>

                <div class="bg-white rounded-xl border-2 border-pink-300 p-4 space-y-4">
                    <input type="text" id="user-name" placeholder="姓名" class="input-pink" required>
                    <input type="tel" id="phone" placeholder="WhatsApp 電話" class="input-pink" required>
                    <select id="purpose-select" class="select-pink">
                        <option value="練習">練習</option>
                        <option value="教學">教學</option>
                    </select>
                    <textarea id="notes" placeholder="備註" class="input-pink" rows="2"></textarea>
                    
                    <div class="price-display">
                        <div class="flex justify-between font-bold text-pink-900">
                            <span>總預計金額：</span>
                            <span id="total-price-display" class="text-2xl text-pink-600">$0</span>
                            <input type="hidden" id="manual-price" value="0">
                        </div>
                    </div>

                    <button type="submit" id="submit-booking-btn" class="btn-primary w-full py-4">📝 提交預約申請</button>
                    <div id="staff-payment-section" style="display:none;" class="grid grid-cols-2 gap-2">
                        <button type="button" id="submit-paid-btn" class="btn-primary">✅ 立即付款</button>
                        <button type="button" id="submit-pending-btn" class="btn-secondary">⏳ 先預約</button>
                    </div>
                </div>
            </form>
        </section>
        
        <aside id="sidebar" style="display:none; width:300px;" class="border-l p-4 bg-white overflow-y-auto">
            <h3 class="font-bold mb-4">📋 預約清單</h3>
            <div id="booking-list" class="space-y-2"></div>
        </aside>
    </main>
  </div>

  <div id="toast-container" class="fixed top-10 right-6 z-50 space-y-2"></div>

  <script>
    /* -----------------------------------------------------------
       核心邏輯與 Email 通知功能
    ----------------------------------------------------------- */
    
    // ⚠️ 這是你剛剛產生的 Google API 網址
    const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzvnj29GP2k1dIDI6lMcpNxkg924NCqh99lCHDAs9jli2M8MF9Kxd99gX6V1Mf6j7W2/exec";

    // 寄送 Email 的功能
    function sendEmailNotification(recentBookings, finalPrice) {
      if (!recentBookings || recentBookings.length === 0) return;
      
      const datesStr = recentBookings.map(b => b.start_date).join(', ');
      const firstBooking = recentBookings[0]; 

      const payload = {
        user_name: firstBooking.user_name,
        phone: firstBooking.phone,
        room: firstBooking.room_id,
        dates: datesStr,
        time: `${firstBooking.start_time} - ${firstBooking.end_time}`,
        purpose: firstBooking.purpose,
        price: finalPrice,
        notes: firstBooking.notes
      };

      fetch(GOOGLE_SCRIPT_URL, {
        method: 'POST',
        mode: 'no-cors', // 解決跨域問題
        body: JSON.stringify(payload)
      }).then(() => {
        console.log("通知已送出至 Google Script");
      }).catch(err => console.error("通知失敗:", err));
    }

    // ... (保留你原本所有的變數定義: rooms, publicHolidays, bookings 等) ...
    const rooms = [{ id: 'A', name: '房間A', rates: { weekday: 280, weekend: 380 }, hasVideo: true }, { id: 'B', name: '房間B', rates: { weekday: 60, weekend: 90 } }, { id: 'C', name: '房間C', rates: { weekday: 60, weekend: 90 } }, { id: 'D', name: '房間D', rates: { weekday: 60, weekend: 90 } }, { id: 'E', name: '房間E', rates: { weekday: 60, weekend: 90 } }, { id: '1', name: '房間1', rates: { weekday: 100, weekend: 150 } }, { id: '2', name: '房間2', rates: { weekday: 80, weekend: 120 } }];
    let bookings = JSON.parse(localStorage.getItem('kaya_music_bookings') || '[]');
    let selectedDates = [];
    let currentRoom = '';
    let isStaffMode = false;

    // 修改 handlePublicBooking 以加入通知
    async function handlePublicBooking() {
      const startTime = document.getElementById('start-time-select').value;
      const endTime = document.getElementById('end-time-select').value;
      const userName = document.getElementById('user-name').value;
      const phone = document.getElementById('phone').value;
      const price = document.getElementById('manual-price').value;

      if (!currentRoom || selectedDates.length === 0 || !startTime || !endTime) {
        showToast('請完整填寫資料', 'error');
        return;
      }

      const newBookings = [];
      selectedDates.forEach(date => {
        const b = {
          id: Date.now() + Math.random(),
          room_id: currentRoom,
          start_date: date.toISOString().split('T')[0],
          start_time: startTime,
          end_time: endTime,
          user_name: userName,
          phone: phone,
          purpose: document.getElementById('purpose-select').value,
          notes: document.getElementById('notes').value,
          total_amount: parseInt(price),
          payment_status: 'pending'
        };
        bookings.push(b);
        newBookings.push(b);
      });

      localStorage.setItem('kaya_music_bookings', JSON.stringify(bookings));
      
      // ✅ 執行寄信通知
      sendEmailNotification(newBookings, price);

      showToast('✅ 預約提交成功！請等候 WhatsApp 聯絡', 'success');
      resetForm();
    }

    // ... (其餘 UI 控制邏輯、日曆渲染、價格計算等，均保留你原本的程式碼) ...
    // 為簡化回覆，下方省略重複的 UI 渲染代碼，請將此 Script 區塊整合進你原本的代碼中即可
    
    // 初始化與事件綁定 (範例)
    document.getElementById('booking-form').addEventListener('submit', (e) => {
        e.preventDefault();
        handlePublicBooking();
    });

    // 登入邏輯
    document.getElementById('public-access-btn').onclick = () => {
        document.getElementById('login-overlay').style.display = 'none';
        document.getElementById('app-content').style.display = 'flex';
    };
    
    document.getElementById('staff-login-btn').onclick = () => {
        if(document.getElementById('staff-password').value === 'kaya2026') {
            isStaffMode = true;
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('app-content').style.display = 'flex';
            document.getElementById('sidebar').style.display = 'block';
            document.getElementById('statistics-section').style.display = 'flex';
        }
    };
    
    // 初始呼叫
    function showToast(m, t) {
        const div = document.createElement('div');
        div.className = `p-4 rounded shadow-lg text-white ${t==='success'?'bg-green-500':'bg-red-500'}`;
        div.textContent = m;
        document.getElementById('toast-container').appendChild(div);
        setTimeout(()=>div.remove(), 3000);
    }
    
    // 時間選項生成
    const startS = document.getElementById('start-time-select');
    const endS = document.getElementById('end-time-select');
    for(let i=8; i<22; i++) {
        let t = `${i<10?'0'+i:i}:00`;
        startS.innerHTML += `<option value="${t}">${t}</option>`;
        endS.innerHTML += `<option value="${t}">${t}</option>`;
    }

    // 房間點擊
    document.querySelectorAll('.room-card').forEach(card => {
        card.onclick = () => {
            document.querySelectorAll('.room-card').forEach(c => c.classList.remove('active'));
            card.classList.add('active');
            currentRoom = card.dataset.room;
            document.getElementById('manual-price').value = 100; // 簡易預設
            document.getElementById('total-price-display').textContent = '$100';
        };
    });
    
    function resetForm() {
        document.getElementById('booking-form').reset();
        selectedDates = [];
        document.getElementById('selected-dates-display').innerHTML = '';
    }

  </script>
</body>
</html>
